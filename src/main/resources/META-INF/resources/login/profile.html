<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>league of legends - 메인 페이지 </title>
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="../js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <!-- <script src="js/test.js"></script> -->
        <script src="../js/test2.js"></script>
        <script src="../js/toggle.js"></script>

        <link rel ="stylesheet" href="../css/main.css">
        <!-- (lol 테마 + 챔피언 호버 효과) -->
    </head>
    <body>
        <!-- 헤더 Navbar-->
        <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
            <img src="../images/lol_logo.jpeg" alt="LOL로고" width="30" height="24">
            <!--변경 -->
            <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">
                🌙 DARK
            </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNavDropdown">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">뉴스</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">챔피언</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../main_page_sub/download.html">다운로드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">로그인</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">외부 웹사이트</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="https://www.leagueoflegends.com/ko-kr/" target="_blank">LOL 공식 웹사이트</a></li>
                        <li><a class="dropdown-item" href="#">E sports</a></li>
                        <li><a class="dropdown-item" href="#">알아보기</a></li>
                    </ul>
                    </li>
                </ul>
                <form class="d-flex" id="searchForm">
                    <input class="form-control me-2" type="search" placeholder="챔피언, 뉴스 검색 ..." aria-label="Search" id="searchInput">
                    <button class="btn btn-outline-success" type="submit">검색하기</button>
                </form>
            </div>
        </div>
        </nav>

        <!-- 페이지 디자인 재활용 -->
        <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 500px;">
            <h2 class="fw-bold mb-4"> 🧟‍♀️ 내 프로필 </h2>

            <!--프로필 사진 영역-->
            <div class="mb-4">
                <img id="profileImg" src="/uploads/profile/default.png" class="rounded-circle" width="120" height="120" style="object-fit:cover; border:3px solid #fff;" alt="프로필사진">
            </div>
        <!-- 개인 정보 출력 -->
        <div class="card bg-dark text-white border-secondary mb-4">
            <div class="card-body text-start">
                <table class="table table-dark table-bordered mb-0">
                    <tr>
                        <tr style="width: 30%;">아이디</tr>
                        <td id="infoUsername"></td>
                    </tr>
                    <tr>
                        <th>이메일</th>
                        <td id="infoEmail"></td>
                    </tr>
                    <tr>
                        <th>연락처</th>
                        <td id="infoPhone"></td>
                    </tr>
                </table>
            </div>
        </div>
        <!--사진 업로드 폼-->
        <form id="uploadForm" method="POST" action="/profile/upload" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">프로필 사진 변경</label>
                <input type="file" class="form-control" id="profileFile" name="profileImage" accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="form-text text-muted">
                    jpg, png, gif, webp / 최대5MB
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                사진 업로드
            </button>
        </form>
        </div>
        </section>
        <script src="../js/search.js"></script>
        <script src="../js/toggle.js"></script>
        <script src="../js/Profile.js"></script>
    </body>
</html>
