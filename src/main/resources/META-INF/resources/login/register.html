<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>league of legends - 메인 페이지 </title>
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="../js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <!-- <script src="js/test.js"></script> -->
        <script src="../js/test2.js"></script>
        <script src="../js/toggle.js"></script>

        <link rel ="stylesheet" href="../css/main.css">
        <!-- (lol 테마 + 챔피언 호버 효과) -->
    </head>
    <body>
        <!-- 헤더 Navbar-->
        <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
            <img src="../images/lol_logo.jpeg" alt="LOL로고" width="30" height="24">
            <!--변경 -->
            <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">
                🌙 DARK
            </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNavDropdown">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">뉴스</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">챔피언</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../main_page_sub/download.html">다운로드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">로그인</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">외부 웹사이트</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="https://www.leagueoflegends.com/ko-kr/" target="_blank">LOL 공식 웹사이트</a></li>
                        <li><a class="dropdown-item" href="#">E sports</a></li>
                        <li><a class="dropdown-item" href="#">알아보기</a></li>
                    </ul>
                    </li>
                </ul>
                <form class="d-flex" id="searchForm">
                    <input class="form-control me-2" type="search" placeholder="챔피언, 뉴스 검색 ..." aria-label="Search" id="searchInput">
                    <button class="btn btn-outline-success" type="submit">검색하기</button>
                </form>
            </div>
        </div>
        </nav>

        <!-- 네비바 -> index.html과 동일하게 복사 -->
        <section class="hero d-flex align-items-center justify-content-center text-center py-5">
            <div class="container" style="max-width: 400px;">
                <h2 class="fw-bold mb-4">회원가입</h2>

                <form id="registerForm" action="/register_check" method="post">
                    <!-- 아이디 -->
                     <div class="mb-3 text-start">
                        <label class="form-label">아이디 *</label>
                        <input type="text" class="form-control"
                            id="username" name="username"
                            placeholder="4~20자 영문/숫자" required>
                        <div class="invalid-feedback" id="usernameMsg"></div>
                     </div>

                    <!-- 패스워드 -->
                    <div class="mb-3 text-start">
                        <label class="form-label">패스워드 *</label>
                        <input type="password" class="form-control"
                            id="password"
                            placeholder="8자 이상, 영문+숫자+특수문자" required>
                    </div>

                    <!-- 패스워드 확인-->
                    <div class="mb-3 text-start">
                        <label class="form-label">패스워드 확인*</label>
                        <input type="password" class="form-control"
                            id="passwordConfirm"
                            placeholder="패스워드 재입력" required>
                        <div class="invalid-feedback" id="passwordMsg"></div>
                    </div>

                    <!-- 이메일 -->
                    <div class="mb-3 text-start">
                        <label class="form-label">이메일*</label>
                        <input type="email" class="form-control"
                            id="email" name="email"
                            placeholder="example@email.com" required>
                        <div class="invalid-feedback" id="emailMsg"></div>
                    </div>

                    <!-- 연락처 -->
                     <div class="mb-3 text-start">
                        <label class="form-label">연락처*</label>
                        <input type="text" class="form-control"
                            id="phone" name="phone"
                            placeholder="010-0000-0000" required>
                        <div class="invalid-feedback" id="phoneMsg"></div>
                    </div>

                    <input type="hidden" id="hashedPassword" name="password">

                    <button type="button" class="btn btn-primary w-100"
                        onclick="validateAndShowModal()">
                        회원가입
                    </button>
                </form>
            </div>
        </section>
        <!-- 가입 확인 모달 -->
        <div class="modal fade" id="confirmModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark text-white border-secondary">

                <div class="modal-header border-secondary">
                    <h5 class="modal-title"> 🎮 가입 확인</h5>
                    <button type="button" class="btn-close btn-close-white"
                    data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>아래 정보로 가입하시겠습니까?</p>
                    <table class="table table-dark table-bordered">
                        <tr><th>아이디</th>
                            <td id="confirmUsername"></td></tr>
                        <tr><th>이메일</th>
                            <td id="confirmEmail"></td></tr>
                        <tr><th>연락처</th>
                            <td id="confirmPhone"></td></tr>
                        <tr><th>패스워드</th>
                            <td>******** (암호화 전송)</td></tr>
                        </table>
                </div>

                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary"
                        onclick="submitRegister()">가입하기</button>
                    </div>

                </div>
            </div>
        </div>
        
        <script src="../js/search.js"></script>
        <script src="../js/input_check.js"></script>
        <script src="../js/input_sha256.js"></script>
    </body>
</html>
