<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {background-color: #0a0e17; color: #fff;}
            .accent-purple {color: #ff98f0;}
            .card {background-color: #1e1e1e; border:none; color:white;}
            .btn-primary {background-color: #a020f0; border: none;}
            /* 4단계 : 애니메이션 및 시각 효과 주기 */
            .card {transition: transform 0.3s, box-shadow 0.3s;}
            .card:hover {transform: scale(1.05);/* 마우스를 올리면 커짐 */
            box-shadow: 0 10px 20px rgba(188, 255, 32, 0.5); /* 보라색 광원 효과 */}
            .card-img-top {height: 200px; object-fit: cover; /* 이미지가 찌그러지지 않게 채움*/}
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid"><a class="navbar-brand">League of Legends</a></div>
        </nav>
            <p>적의 넥서스를 파괴하세요! 5v5 MOVA 전투에서 팀과 함께 승리하세요.</p>
    
    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Aatrox.png" class="card-img-top">
                    <div class="card-body">
                        <h5>Aatrox</h5>
                        <p>어둠의 검으로 적을 베세요</p>
                    </div>
                    <h2 class="text-center accent-purple">챔피언 선택</h2>
                </div>
                <ul>
                    <li>Aatox(탑) - 어둠의 검으로 적을 베세요.</li>
                    <li>Sylas(정글/미드) - 궁극기를 훔치세요!</li>
                </ul>
            </div>
        </div>
    </div>
    <h1>최신 뉴스</h1>
    <h2>새로운 챔피언 출시</h2>
    <p>2026  루나 레벨 이벤트!</p>
    </body>
</html>
